info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'
dataSource:
  driverClassName: org.postgresql.Driver
  username: postgres
  password: ''
  pooled: true
  jmxExport: true
environments:
  development:
    dataSource:
      dbCreate: create-drop
      url: jdbc:postgresql://localhost:5432/devDb?tcpKeepAlive=true
  test:
    dataSource:
      dbCreate: create-drop
      url: jdbc:tc:postgresql:16:///postgres
      driverClassName: org.testcontainers.jdbc.ContainerDatabaseDriver
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
    grails:
      plugin:
        databasemigration:
          updateOnStart: false
  production:
    dataSource:
      dbCreate: none
      url: jdbc:postgresql://localhost:5432/postgres?tcpKeepAlive=true
hibernate:
  cache:
    queries: false
    use_second_level_cache: false
    use_query_cache: false
grails:
  codegen:
    defaultPackage: example
  profile: rest-api
  mime:
    disable:
      accept:
        header:
          userAgents:
          - Gecko
          - WebKit
          - Presto
          - Trident
    types:
      json:
      - application/json
      - text/json
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      js: text/javascript
      rss: application/rss+xml
      text: text/plain
      all: '*/*'
  views:
    default:
      codec: html
micronaut:
  codec:
    json:
      additionalTypes:
        - text/javascript
